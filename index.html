<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper2Digital - 종이 유인물 스마트 변환기</title>
    
    <!-- 스타일: Tailwind CSS & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <!-- 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script type="text/babel" data-type="module">
        const { useState, useRef, useEffect, useMemo } = React;

        // 아이콘 헬퍼 (removeChild 에러 방지를 위해 가상 DOM 보호)
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    // 기존 내용을 비우고 새로 생성하여 충돌 방지
                    iconRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons({
                        attrs: { class: className },
                        nameAttr: 'data-lucide',
                        icons: window.lucide.icons
                    });
                }
            }, [name, size, className]);

            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        function App() {
            const [image, setImage] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [isCameraActive, setIsCameraActive] = useState(false);
            
            const resultRef = useRef(null);
            const fileInputRef = useRef(null);
            const videoRef = useRef(null);
            const streamRef = useRef(null);

            useEffect(() => {
                return () => {
                    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
                };
            }, []);

            const handleImageUpload = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setImage(event.target.result);
                        setResult(null);
                        setError(null);
                        stopCamera();
                    };
                    reader.readAsDataURL(file);
                }
            };

            const startCamera = async () => {
                setIsCameraActive(true);
                setImage(null);
                setResult(null);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    streamRef.current = stream;
                    if (videoRef.current) videoRef.current.srcObject = stream;
                } catch (err) {
                    setError("카메라 권한이 필요합니다.");
                    setIsCameraActive(false);
                }
            };

            const stopCamera = () => {
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(t => t.stop());
                    streamRef.current = null;
                }
                setIsCameraActive(false);
            };

            const capturePhoto = () => {
                if (videoRef.current) {
                    const canvas = document.createElement('canvas');
                    canvas.width = videoRef.current.videoWidth;
                    canvas.height = videoRef.current.videoHeight;
                    canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
                    setImage(canvas.toDataURL('image/jpeg'));
                    stopCamera();
                }
            };

            const analyzeImage = async () => {
                setIsAnalyzing(true);
                setError(null);
                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image })
                    });
                    
                    if (!response.ok) {
                        const data = await response.json();
                        throw new Error(data.error || "분석 실패");
                    }

                    const data = await response.json();
                    const text = data.text;
                    
                    const titleMatch = text.match(/\[TITLE\]:(.*?)(\n|$)/i);
                    const summaryMatch = text.match(/\[SUMMARY\]:([\s\S]*?)(\[ORIGINAL\]|$)/i);
                    const originalMatch = text.match(/\[ORIGINAL\]:([\s\S]*)/i);

                    setResult({
                        title: titleMatch ? titleMatch[1].trim() : "분석 결과",
                        summary: summaryMatch ? summaryMatch[1].trim() : "요약 실패",
                        originalText: originalMatch ? originalMatch[1].trim() : "추출 실패"
                    });
                } catch (err) {
                    setError(err.message || "AI 분석 오류가 발생했습니다.");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const downloadPDF = async () => {
                try {
                    const canvas = await window.html2canvas(resultRef.current, { scale: 2, useCORS: true });
                    const imgData = canvas.toDataURL('image/png');
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    pdf.addImage(imgData, 'PNG', 10, 10, 190, (canvas.height * 190) / canvas.width);
                    pdf.save(`${result.title}.pdf`);
                } catch (err) {
                    setError("PDF 생성에 실패했습니다.");
                }
            };

            return (
                <div className="min-h-screen bg-[#F8FAFC] text-slate-800 flex flex-col">
                    <header className="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between sticky top-0 z-20">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                                <Icon name="book-open" size={20} />
                            </div>
                            <h1 className="text-xl font-extrabold text-slate-900">Paper2Digital</h1>
                        </div>
                        <div className="flex items-center gap-2 text-slate-400">
                            <Icon name="zap" size={16} className="text-yellow-500 fill-yellow-500" />
                            <span className="text-[10px] font-black uppercase tracking-widest">AI Hub</span>
                        </div>
                    </header>

                    <main className="flex-1 max-w-[1400px] w-full mx-auto p-6 gap-6 flex flex-col lg:flex-row overflow-hidden">
                        <div className="w-full lg:w-1/3 flex flex-col gap-6">
                            {!image && !isCameraActive ? (
                                <div className="grid grid-cols-1 gap-4">
                                    <div onClick={() => fileInputRef.current.click()} className="h-40 border-2 border-dashed border-slate-200 bg-white rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 transition-all">
                                        <input type="file" ref={fileInputRef} className="hidden" onChange={handleImageUpload} accept="image/*"/>
                                        <Icon name="upload" size={24} className="text-blue-500 mb-2" />
                                        <p className="font-bold">기기에서 업로드</p>
                                    </div>
                                    <div onClick={startCamera} className="h-40 border-2 border-dashed border-slate-200 bg-white rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:border-green-400 transition-all">
                                        <Icon name="camera" size={24} className="text-green-500 mb-2" />
                                        <p className="font-bold">사진 찍기</p>
                                    </div>
                                </div>
                            ) : isCameraActive ? (
                                <div className="space-y-4">
                                    <video ref={videoRef} autoPlay playsInline className="w-full aspect-[3/4] bg-black rounded-3xl object-cover" />
                                    <div className="flex gap-2">
                                        <button onClick={capturePhoto} className="flex-1 py-4 bg-green-600 text-white rounded-2xl font-bold">촬영하기</button>
                                        <button onClick={stopCamera} className="px-6 bg-slate-100 rounded-2xl font-bold">취소</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 space-y-6">
                                    <div className="relative aspect-square rounded-2xl overflow-hidden bg-slate-50">
                                        <img src={image} className="w-full h-full object-contain" />
                                        <button onClick={() => setImage(null)} className="absolute top-3 right-3 p-2 bg-white/90 shadow rounded-xl">
                                            <Icon name="refresh-cw" size={16} />
                                        </button>
                                    </div>
                                    <button onClick={analyzeImage} disabled={isAnalyzing} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold shadow-xl shadow-blue-100">
                                        {isAnalyzing ? <Icon name="refresh-cw" className="animate-spin-custom" size={20}/> : "AI 분석 시작"}
                                    </button>
                                </div>
                            )}
                        </div>

                        <div className="flex-1 bg-white rounded-3xl border border-slate-200 shadow-sm flex flex-col min-h-[600px] overflow-hidden">
                            <div className="border-b border-slate-100 px-8 py-5 flex items-center justify-between">
                                <span className="font-bold">학습 리포트</span>
                                {result && <button onClick={downloadPDF} className="bg-slate-900 text-white px-5 py-2 rounded-xl text-xs font-bold flex items-center gap-2">
                                    <Icon name="download" size={16} /> PDF
                                </button>}
                            </div>
                            <div className="flex-1 p-10 overflow-y-auto custom-scrollbar">
                                {result ? (
                                    <div ref={resultRef} className="space-y-10 max-w-[800px] mx-auto bg-white p-4">
                                        <div>
                                            <h2 className="text-3xl font-extrabold text-slate-950 mb-3 tracking-tight">{result.title}</h2>
                                            <p className="text-slate-400 text-[10px] uppercase font-black tracking-widest flex items-center gap-2">
                                                <span className="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span> Complete
                                            </p>
                                        </div>
                                        <section>
                                            <h4 className="text-[10px] font-black text-blue-500 mb-4 border-b border-blue-50 pb-2">핵심 요약</h4>
                                            <div className="text-base text-slate-700 leading-relaxed whitespace-pre-wrap">{result.summary}</div>
                                        </section>
                                        <section className="bg-slate-50 p-6 rounded-3xl">
                                            <h4 className="text-[10px] font-black text-slate-400 mb-4">OCR 전문</h4>
                                            <div className="text-[11px] text-slate-400 font-mono whitespace-pre-wrap max-h-[300px] overflow-y-auto custom-scrollbar">{result.originalText}</div>
                                        </section>
                                    </div>
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-300 py-20 pb-40">
                                        <Icon name="file-text" size={64} className="opacity-10 mb-6" />
                                        <p className="font-bold text-slate-400 text-center leading-relaxed">사진을 올려주시면 AI가<br/>수업 내용을 완벽하게 정리해드려요</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {error && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl text-xs font-bold z-50 flex items-center gap-4 shadow-2xl">
                            <Icon name="alert-circle" size={18} className="text-red-400" />
                            {error}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
