<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper2Digital - 종이 유인물 스마트 변환기</title>
    
    <!-- Styles: Tailwind CSS 4 & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <!-- Import Map for ESM Dependencies -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "@google/generative-ai": "https://esm.sh/@google/generative-ai@0.1.1",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0",
            "framer-motion": "https://esm.sh/framer-motion@11.0.8",
            "jspdf": "https://esm.sh/jspdf@2.5.1",
            "html2canvas": "https://esm.sh/html2canvas@1.4.1"
        }
    }
    </script>

    <script type="module">
        import React, { useState, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { GoogleGenerativeAI } from "@google/generative-ai";
        import { 
            Upload, FileText, Download, RefreshCw, 
            AlertCircle, BookOpen, Layers, Settings, CheckCircle2, X
        } from 'lucide-react';
        import { motion, AnimatePresence } from 'framer-motion';
        import jsPDF from 'jspdf';
        import html2canvas from 'html2canvas';

        // Helper to use Lucide icons with React.createElement
        const Icon = ({ icon: IconComponent, ...props }) => React.createElement(IconComponent, props);

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showSettings, setShowSettings] = useState(!apiKey);
            const [tempKey, setTempKey] = useState(apiKey);
            const [image, setImage] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            
            const resultRef = useRef(null);
            const fileInputRef = useRef(null);

            const saveApiKey = (e) => {
                e.preventDefault();
                localStorage.setItem('gemini_api_key', tempKey);
                setApiKey(tempKey);
                setShowSettings(false);
                setError(null);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    if (!file.type.startsWith('image/')) {
                        setError('이미지 파일만 업로드 가능합니다.');
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setImage(event.target.result);
                        setResult(null);
                        setError(null);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const analyzeImage = async () => {
                if (!apiKey) { setShowSettings(true); return; }
                setIsAnalyzing(true);
                setError(null);

                try {
                    const genAI = new GoogleGenerativeAI(apiKey);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    const base64Data = image.split(',')[1];
                    const prompt = "이 이미지는 고등학생의 수업 유인물입니다. 다음 작업을 수행해주세요:\n1. 모든 텍스트를 추출(OCR)해주세요.\n2. 핵심 내용을 공부하기 좋게 요약해주세요.\n3. 적절한 제목을 정해주세요.\n\n출력 형식:\n[TITLE]: 제목\n[SUMMARY]: 요약 내용\n[ORIGINAL]: 추출된 전체 텍스트";

                    const response = await model.generateContent([
                        prompt,
                        { inlineData: { data: base64Data, mimeType: "image/jpeg" } }
                    ]);
                    const text = response.response.text();
                    
                    const titleMatch = text.match(/\[TITLE\]:(.*?)(\n|$)/i);
                    const summaryMatch = text.match(/\[SUMMARY\]:([\s\S]*?)(\[ORIGINAL\]|$)/i);
                    const originalMatch = text.match(/\[ORIGINAL\]:([\s\S]*)/i);

                    setResult({
                        title: titleMatch ? titleMatch[1].trim() : "분석된 학습 자료",
                        summary: summaryMatch ? summaryMatch[1].trim() : "요약 내용을 파싱하지 못했습니다.",
                        originalText: originalMatch ? originalMatch[1].trim() : "원문을 추출하지 못했습니다."
                    });
                } catch (err) {
                    console.error(err);
                    setError("분석 오류. API 키를 확인해주세요.");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const downloadPDF = async () => {
                if (!resultRef.current) return;
                try {
                    const canvas = await html2canvas(resultRef.current, { scale: 2, useCORS: true, backgroundColor: '#FFFFFF' });
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const imgWidth = 190;
                    const imgHeight = (canvas.height * imgWidth) / canvas.width;
                    pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
                    pdf.save(`${result?.title || 'note'}.pdf`);
                } catch (err) {
                    setError("PDF 생성 실패.");
                }
            };

            // JSX elements as pure JS for Vite compatibility within script tag
            return React.createElement('div', { className: "min-h-screen bg-[#F8FAFC] text-slate-800 flex flex-col" },
                // Header
                React.createElement('header', { className: "h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between sticky top-0 z-20" },
                    React.createElement('div', { className: "flex items-center gap-3" },
                        React.createElement('div', { className: "w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white" },
                            React.createElement(Icon, { icon: BookOpen, size: 20 })
                        ),
                        React.createElement('h1', { className: "text-xl font-extrabold text-slate-900 tracking-tight" }, "Paper2Digital")
                    ),
                    React.createElement('button', { onClick: () => setShowSettings(true), className: "p-2.5 hover:bg-slate-50 rounded-xl text-slate-500 transition-all flex items-center gap-2 border border-transparent" },
                        React.createElement(Icon, { icon: Settings, size: 20 }),
                        React.createElement('span', { className: "text-xs font-bold hidden sm:block" }, "설정")
                    )
                ),

                // Settings Modal
                React.createElement(AnimatePresence, null,
                    showSettings && React.createElement('div', { className: "fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4" },
                        React.createElement(motion.div, { 
                            initial: { scale: 0.9, opacity: 0 }, 
                            animate: { scale: 1, opacity: 1 }, 
                            exit: { scale: 0.9, opacity: 0 },
                            className: "bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl relative"
                        },
                            React.createElement('h2', { className: "text-2xl font-bold mb-4" }, "Gemini AI 설정"),
                            React.createElement('p', { className: "text-sm text-slate-500 mb-6" }, 
                                "Gemini API 키를 입력해주세요. 발급은 ", 
                                React.createElement('a', { href: "https://aistudio.google.com/app/apikey", target: "_blank", className: "text-blue-600 font-bold" }, "이곳"),
                                "에서 가능합니다."
                            ),
                            React.createElement('form', { onSubmit: saveApiKey, className: "space-y-4" },
                                React.createElement('input', { 
                                    type: "password", 
                                    value: tempKey, 
                                    onChange: (e) => setTempKey(e.target.value),
                                    placeholder: "API Key (AIZA...)",
                                    className: "w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-50"
                                }),
                                React.createElement('div', { className: "flex gap-2" },
                                    React.createElement('button', { type: "submit", className: "flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100" }, "저장"),
                                    apiKey && React.createElement('button', { type: "button", onClick: () => setShowSettings(false), className: "px-6 bg-slate-100 rounded-2xl font-bold" }, "취소")
                                )
                            )
                        )
                    )
                ),

                // Main Content
                React.createElement('main', { className: "flex-1 max-w-[1400px] w-full mx-auto p-6 gap-6 flex flex-col lg:flex-row" },
                    // Left Column
                    React.createElement('div', { className: "w-full lg:w-1/3 flex flex-col gap-6" },
                        !image ? React.createElement('div', { 
                            onClick: () => fileInputRef.current?.click(),
                            className: "h-80 border-2 border-dashed border-slate-200 bg-white rounded-3xl flex flex-col items-center justify-center p-8 cursor-pointer hover:border-blue-400 bg-slate-50/50 group transition-all"
                        },
                            React.createElement('input', { type: "file", ref: fileInputRef, className: "hidden", onChange: handleImageUpload, accept: "image/*" }),
                            React.createElement('div', { className: "w-20 h-20 bg-white text-blue-500 rounded-full flex items-center justify-center mb-6 shadow-sm border border-slate-100 group-hover:scale-110 transition-transform" },
                                React.createElement(Icon, { icon: Upload, size: 32 })
                            ),
                            React.createElement('p', { className: "font-extrabold text-slate-900 text-lg" }, "유인물 업로드"),
                            React.createElement('p', { className: "text-xs text-slate-400 mt-2 uppercase font-black" }, "JPG, PNG")
                        ) : React.createElement('div', { className: "bg-white rounded-3xl border border-slate-200 p-6 shadow-sm space-y-6" },
                            React.createElement('div', { className: "relative aspect-square rounded-2xl overflow-hidden bg-slate-50 border border-slate-100" },
                                React.createElement('img', { src: image, className: "w-full h-full object-contain" }),
                                React.createElement('button', { onClick: () => setImage(null), className: "absolute top-3 right-3 p-2 bg-white/90 shadow-sm rounded-xl" },
                                    React.createElement(Icon, { icon: RefreshCw, size: 16 })
                                )
                            ),
                            React.createElement('button', { 
                                onClick: analyzeImage, 
                                disabled: isAnalyzing,
                                className: "w-full py-5 bg-blue-600 text-white rounded-2xl font-bold shadow-xl shadow-blue-100 hover:bg-blue-700 disabled:opacity-50"
                            }, 
                                isAnalyzing ? React.createElement(Icon, { icon: RefreshCw, className: "animate-spin-custom inline-block mr-2", size: 20 }) : React.createElement(Icon, { icon: Layers, className: "inline-block mr-2", size: 20 }),
                                isAnalyzing ? "분석 중..." : "AI 요약 시작"
                            )
                        ),
                        React.createElement('div', { className: "bg-white rounded-3xl border border-slate-200 p-6" },
                            React.createElement('h3', { className: "font-bold mb-4 flex items-center gap-2" }, 
                                React.createElement(Icon, { icon: CheckCircle2, size: 16, className: "text-blue-500" }), "이용 안내"
                            ),
                            React.createElement('ul', { className: "space-y-3 text-slate-500 text-xs" },
                                React.createElement('li', null, "• 유인물을 밝은 곳에서 수직으로 찍어주세요."),
                                React.createElement('li', null, "• 필기도 최대한 함께 분석해 드립니다."),
                                React.createElement('li', null, "• 결과를 PDF로 저장해서 오답노트로 쓰세요.")
                            )
                        )
                    ),

                    // Right Column
                    React.createElement('div', { className: "flex-1 bg-white rounded-3xl border border-slate-200 shadow-sm flex flex-col min-h-[600px] overflow-hidden" },
                        React.createElement('div', { className: "border-b border-slate-100 px-8 py-5 flex items-center justify-between" },
                            React.createElement('span', { className: "text-sm font-bold" }, "분석 리포트"),
                            result && React.createElement('button', { onClick: downloadPDF, className: "bg-slate-900 text-white px-5 py-2.5 rounded-2xl text-xs font-bold flex items-center gap-2" },
                                React.createElement(Icon, { icon: Download, size: 16 }), "PDF 저장"
                            )
                        ),
                        React.createElement('div', { className: "flex-1 p-10 overflow-y-auto custom-scrollbar" },
                            result ? React.createElement('div', { ref: resultRef, className: "space-y-10 max-w-[800px] mx-auto bg-white" },
                                React.createElement('div', null,
                                    React.createElement('h2', { className: "text-3xl font-extrabold text-slate-950 mb-3 tracking-tight" }, result.title),
                                    React.createElement('p', { className: "text-slate-400 text-[10px] font-black uppercase tracking-widest flex items-center gap-2" },
                                        React.createElement('span', { className: "w-2 h-2 bg-blue-500 rounded-full animate-pulse" }), "AI Analysis Complete"
                                    )
                                ),
                                React.createElement('section', null,
                                    React.createElement('h4', { className: "text-[10px] font-black uppercase tracking-widest text-blue-500 mb-4 border-b border-blue-50 pb-2" }, "요약 내용"),
                                    React.createElement('div', { className: "text-base text-slate-700 leading-relaxed whitespace-pre-wrap font-medium" }, result.summary)
                                ),
                                React.createElement('section', { className: "bg-slate-50 p-8 rounded-3xl border border-slate-100 shadow-inner" },
                                    React.createElement('h4', { className: "text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4" }, "추출된 원문"),
                                    React.createElement('div', { className: "text-[11px] text-slate-400 font-mono leading-relaxed whitespace-pre-wrap max-h-[400px] overflow-y-auto custom-scrollbar" }, result.originalText)
                                ),
                                React.createElement('div', { className: "p-4 bg-yellow-50/50 rounded-2xl border border-yellow-100 flex items-start gap-4" },
                                    React.createElement(Icon, { icon: AlertCircle, size: 18, className: "text-yellow-600 mt-0.5" }),
                                    React.createElement('p', { className: "text-[11px] text-yellow-800 leading-relaxed" }, "AI 분석 결과는 참고용입니다. 정확한 내용은 원본 자료를 대조해 확인하세요.")
                                )
                            ) : React.createElement('div', { className: "h-full flex flex-col items-center justify-center text-slate-300 py-20" },
                                React.createElement('div', { className: "w-24 h-24 bg-slate-50 rounded-[2.5rem] flex items-center justify-center border border-slate-100 shadow-inner mb-6" },
                                    React.createElement(Icon, { icon: FileText, size: 48, className: "opacity-20" })
                                ),
                                React.createElement('p', { className: "text-lg font-extrabold text-slate-400" }, "학습 사진을 올려주세요")
                            )
                        )
                    )
                ),

                // Error Toast
                React.createElement(AnimatePresence, null,
                    error && React.createElement(motion.div, { 
                        initial: { opacity: 0, y: 50 }, animate: { opacity: 1, y: 0 }, exit: { opacity: 0, scale: 0.9 },
                        className: "fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl text-sm font-bold z-[60] flex items-center gap-4"
                    },
                        React.createElement(Icon, { icon: AlertCircle, size: 20, className: "text-red-400" }),
                        error
                    )
                ),

                // Footer
                React.createElement('footer', { className: "h-12 bg-white border-t border-slate-100 px-8 flex items-center justify-between text-[10px] font-black text-slate-400 shrink-0 uppercase tracking-widest" },
                    React.createElement('span', null, "Paper2Digital System"),
                    React.createElement('span', { className: "hidden sm:block" }, "© 2026 Crafted for Students")
                )
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
