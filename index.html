<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper2Digital - 종이 유인물 스마트 변환기</title>
    
    <!-- 스타일: Tailwind CSS & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <!-- 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "@google/generative-ai": "https://esm.sh/@google/generative-ai@0.1.1"
        }
    }
    </script>

    <script type="text/babel" data-type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";
        const { useState, useRef, useEffect, useCallback } = React;

        // ==========================================
        // 여기에 발급받은 Gemini API 키를 입력하세요.
        // Vercel 배포 시에도 이 파일 하나만 있으면 됩니다.
        // ==========================================
        const GEMINI_API_KEY = "YOUR_API_KEY_HERE"; 

        // 아이콘 컴포넌트 (Lucide 아이콘 사용)
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [image, setImage] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [isCameraActive, setIsCameraActive] = useState(false);
            
            const resultRef = useRef(null);
            const fileInputRef = useRef(null);
            const videoRef = useRef(null);
            const streamRef = useRef(null);

            useEffect(() => {
                return () => {
                    if (streamRef.current) {
                        streamRef.current.getTracks().forEach(track => track.stop());
                    }
                };
            }, []);

            const handleImageUpload = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setImage(event.target.result);
                        setResult(null);
                        setError(null);
                        stopCamera();
                    };
                    reader.readAsDataURL(file);
                }
            };

            const startCamera = async () => {
                setIsCameraActive(true);
                setImage(null);
                setResult(null);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment' } 
                    });
                    streamRef.current = stream;
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                    }
                } catch (err) {
                    setError("카메라를 시작할 수 없습니다. 권한을 확인해주세요.");
                    setIsCameraActive(false);
                }
            };

            const stopCamera = () => {
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(track => track.stop());
                    streamRef.current = null;
                }
                setIsCameraActive(false);
            };

            const capturePhoto = () => {
                if (videoRef.current) {
                    const canvas = document.createElement('canvas');
                    canvas.width = videoRef.current.videoWidth;
                    canvas.height = videoRef.current.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(videoRef.current, 0, 0);
                    const dataUrl = canvas.toDataURL('image/jpeg');
                    setImage(dataUrl);
                    stopCamera();
                }
            };

            const analyzeImage = async () => {
                if (GEMINI_API_KEY === "YOUR_API_KEY_HERE") { 
                    setError("코드 상단의 GEMINI_API_KEY 변수에 API 키를 입력해주세요."); 
                    return; 
                }
                setIsAnalyzing(true);
                setError(null);

                try {
                    const genAI = new GoogleGenerativeAI(GEMINI_API_KEY);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    const base64Data = image.split(',')[1];
                    const prompt = `이 이미지는 고등학생의 수업 유인물입니다. 다음 작업을 수행해주세요:
1. 모든 텍스트를 정확하게 추출(OCR)해주세요.
2. 핵심 내용을 공부하기 좋게 요약해주세요.
3. 적절한 제목을 정해주세요.

출력 형식:
[TITLE]: 제목
[SUMMARY]: 요약 내용
[ORIGINAL]: 추출된 전체 텍스트`;

                    const response = await model.generateContent([
                        prompt,
                        { inlineData: { data: base64Data, mimeType: "image/jpeg" } }
                    ]);
                    const text = response.response.text();
                    
                    const titleMatch = text.match(/\[TITLE\]:(.*?)(\n|$)/i);
                    const summaryMatch = text.match(/\[SUMMARY\]:([\s\S]*?)(\[ORIGINAL\]|$)/i);
                    const originalMatch = text.match(/\[ORIGINAL\]:([\s\S]*)/i);

                    setResult({
                        title: titleMatch ? titleMatch[1].trim() : "분석된 학습 자료",
                        summary: summaryMatch ? summaryMatch[1].trim() : "요약 내용을 파싱하지 못했습니다.",
                        originalText: originalMatch ? originalMatch[1].trim() : "원문을 추출하지 못했습니다."
                    });
                } catch (err) {
                    setError("분석 중 오류가 발생했습니다. API 키가 정확한지 확인해주세요.");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const downloadPDF = async () => {
                if (!resultRef.current) return;
                try {
                    const canvas = await window.html2canvas(resultRef.current, { scale: 2, useCORS: true, backgroundColor: '#FFFFFF' });
                    const imgData = canvas.toDataURL('image/png');
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const imgWidth = 190;
                    const imgHeight = (canvas.height * imgWidth) / canvas.width;
                    pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
                    pdf.save(`${result?.title || 'note'}.pdf`);
                } catch (err) {
                    setError("PDF 생성 실패.");
                }
            };

            return (
                <div className="min-h-screen bg-[#F8FAFC] text-slate-800 flex flex-col">
                    <header className="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between sticky top-0 z-20">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                                <Icon name="book-open" size={20} />
                            </div>
                            <h1 className="text-xl font-extrabold text-slate-900 tracking-tight">Paper2Digital</h1>
                        </div>
                        <div className="flex items-center gap-2 text-slate-400">
                            <Icon name="zap" size={16} className="text-yellow-500 fill-yellow-500" />
                            <span className="text-[10px] font-black uppercase tracking-widest">AI Powered</span>
                        </div>
                    </header>

                    <main className="flex-1 max-w-[1400px] w-full mx-auto p-6 gap-6 flex flex-col lg:flex-row">
                        <div className="w-full lg:w-1/3 flex flex-col gap-6">
                            {!image && !isCameraActive ? (
                                <div className="space-y-4">
                                    <div 
                                        onClick={() => fileInputRef.current.click()} 
                                        className="h-60 border-2 border-dashed border-slate-200 bg-white rounded-3xl flex flex-col items-center justify-center p-8 cursor-pointer hover:border-blue-400 group transition-all"
                                    >
                                        <input type="file" ref={fileInputRef} className="hidden" onChange={handleImageUpload} accept="image/*"/>
                                        <div className="w-16 h-16 bg-white text-blue-500 rounded-full flex items-center justify-center mb-4 shadow-sm border border-slate-100 group-hover:scale-110 transition-transform">
                                            <Icon name="upload" size={24} />
                                        </div>
                                        <p className="font-extrabold text-slate-900 text-lg">기기에서 업로드</p>
                                    </div>
                                    
                                    <div 
                                        onClick={startCamera} 
                                        className="h-60 border-2 border-dashed border-slate-200 bg-white rounded-3xl flex flex-col items-center justify-center p-8 cursor-pointer hover:border-green-400 group transition-all"
                                    >
                                        <div className="w-16 h-16 bg-white text-green-500 rounded-full flex items-center justify-center mb-4 shadow-sm border border-slate-100 group-hover:scale-110 transition-transform">
                                            <Icon name="camera" size={24} />
                                        </div>
                                        <p className="font-extrabold text-slate-900 text-lg">사진 직접 찍기</p>
                                    </div>
                                </div>
                            ) : isCameraActive ? (
                                <div className="bg-white rounded-3xl border border-slate-200 p-4 shadow-sm space-y-4">
                                    <div className="relative aspect-[3/4] rounded-2xl overflow-hidden bg-black border border-slate-100">
                                        <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover" />
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={capturePhoto} className="flex-1 py-4 bg-green-600 text-white rounded-2xl font-bold flex items-center justify-center gap-2">
                                            <Icon name="camera" size={20} /> 찰영하기
                                        </button>
                                        <button onClick={stopCamera} className="px-6 bg-slate-100 rounded-2xl font-bold text-slate-600">
                                            취소
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-white rounded-3xl border border-slate-200 p-6 shadow-sm space-y-6">
                                    <div className="relative aspect-square rounded-2xl overflow-hidden bg-slate-50 border border-slate-100">
                                        <img src={image} className="w-full h-full object-contain" />
                                        <button onClick={() => {setImage(null); stopCamera();}} className="absolute top-3 right-3 p-2 bg-white/90 shadow-sm rounded-xl">
                                            <Icon name="refresh-cw" size={16} />
                                        </button>
                                    </div>
                                    <button onClick={analyzeImage} disabled={isAnalyzing} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold shadow-xl shadow-blue-100 disabled:opacity-50 flex items-center justify-center gap-2 transition-all active:scale-95">
                                        {isAnalyzing ? <Icon name="refresh-cw" className="animate-spin-custom" size={20}/> : <Icon name="layers" size={20}/>}
                                        {isAnalyzing ? "분석 중..." : "AI 요약 시작"}
                                    </button>
                                </div>
                            )}

                            <div className="bg-white rounded-3xl border border-slate-200 p-6">
                                <h3 className="font-bold mb-4 flex items-center gap-2">
                                    <Icon name="check-circle-2" size={16} className="text-blue-500" /> 이용 안내
                                </h3>
                                <ul className="space-y-3 text-slate-500 text-xs leading-relaxed">
                                    <li>• 유인물을 밝은 곳에서 수직으로 촬영하세요.</li>
                                    <li>• 필기도 최대한 함께 분석해 드립니다.</li>
                                    <li>• 결과를 PDF로 저장해서 오답노트로 쓰세요.</li>
                                </ul>
                            </div>
                        </div>

                        <div className="flex-1 bg-white rounded-3xl border border-slate-200 shadow-sm flex flex-col min-h-[600px] overflow-hidden">
                            <div className="border-b border-slate-100 px-8 py-5 flex items-center justify-between">
                                <span className="text-sm font-bold text-slate-800">분석 리포트</span>
                                {result && <button onClick={downloadPDF} className="bg-slate-900 text-white px-5 py-2.5 rounded-2xl text-xs font-bold flex items-center gap-2 hover:bg-slate-800 transition-all active:scale-95 shadow-md">
                                    <Icon name="download" size={16} /> PDF 저장
                                </button>}
                            </div>
                            <div className="flex-1 p-10 overflow-y-auto custom-scrollbar">
                                {result ? (
                                    <div ref={resultRef} className="space-y-10 max-w-[800px] mx-auto bg-white">
                                        <div>
                                            <h2 className="text-3xl font-extrabold text-slate-950 mb-3 tracking-tight">{result.title}</h2>
                                            <div className="flex items-center gap-2 text-slate-400 text-[10px] font-black uppercase tracking-widest">
                                                <span className="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span> Analysis Complete
                                            </div>
                                        </div>
                                        <section>
                                            <h4 className="text-[10px] font-black uppercase tracking-widest text-blue-500 mb-4 border-b border-blue-50 pb-2">핵심 요약</h4>
                                            <div className="text-base text-slate-700 leading-relaxed whitespace-pre-wrap font-medium">{result.summary}</div>
                                        </section>
                                        <section className="bg-slate-50 p-8 rounded-3xl border border-slate-100">
                                            <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4">OCR 전문</h4>
                                            <div className="text-[11px] text-slate-400 font-mono leading-relaxed whitespace-pre-wrap max-h-[400px] overflow-y-auto custom-scrollbar">{result.originalText}</div>
                                        </section>
                                        <div className="p-4 bg-yellow-50 rounded-2xl border border-yellow-100 flex items-start gap-4">
                                            <Icon name="alert-circle" size={18} className="text-yellow-600 mt-0.5" />
                                            <p className="text-[11px] text-yellow-800 leading-relaxed">AI 분석 결과는 참고용이며, 정확한 내용은 원본을 대조해 확인하세요.</p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-300 py-20 pb-40">
                                        <Icon name="file-text" size={64} className="opacity-10 mb-6" />
                                        <p className="text-lg font-extrabold text-slate-400">사진을 업로드하면 분석을 시작합니다</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {error && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl text-sm font-bold z-50 flex items-center gap-4 shadow-2xl">
                            <Icon name="alert-circle" size={20} className="text-red-400" />
                            {error}
                        </div>
                    )}

                    <footer className="h-12 bg-white border-t border-slate-100 px-8 flex items-center justify-between text-[10px] font-black text-slate-400 shrink-0 uppercase tracking-widest">
                        <span>Paper2Digital</span>
                        <span className="hidden sm:block">Academic AI Assistant</span>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
